name: Trend Analysis

on:
  workflow_dispatch:
    inputs:
      target_week_key:
        description: "Optional week key (YYYY-Www), default=current week"
        required: false
        default: ""
      topic:
        description: "Topic for trend stopword profile"
        required: false
        default: ""
        type: choice
        options: ["luxury", "finance"]
      extra_stopwords:
        description: "Optional comma-separated extra stopwords"
        required: false
        default: ""

jobs:
  trend-analysis:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Setup Google credentials
        working-directory: ./backend
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Run trend analysis
        working-directory: ./backend
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          TARGET_WEEK_KEY: ${{ github.event.inputs.target_week_key }}
          TREND_SHEET_NAME: Trend Signals
          TOPIC: ${{ github.event.inputs.topic }}
          EXTRA_STOPWORDS: ${{ github.event.inputs.extra_stopwords }}
        run: python -u run_trend_analysis.py

      - name: Cleanup credentials
        if: always()
        working-directory: ./backend
        run: rm -f credentials.json
