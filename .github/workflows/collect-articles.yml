name: Collect & Summarize Articles

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Run in test mode"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      keywords:
        description: "Comma-separated keyword override"
        required: false
        default: ""
        type: string
      topic:
        description: "Pipeline topic"
        required: false
        default: "finance"
        type: choice
        options: ["finance", "luxury"]
      list_name:
        description: "Source list name from Source Lists sheet (optional)"
        required: false
        default: ""
        type: string


concurrency:
  group: article-pipeline-global
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Python dependencies (retry)
        shell: bash
        run: |
          set -euo pipefail
          cd backend
          for i in 1 2 3; do
            pip install -r requirements.txt && break
            echo "pip install failed (attempt $i). Retrying..."
            sleep 10
          done

      - name: Setup Google Service Account
        shell: bash
        run: |
          set -euo pipefail
          cd backend
          echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Run Article Collection Pipeline (retry + timeout)
        shell: bash
        run: |
          set -euo pipefail
          cd backend

          for i in 1 2; do
            echo "Starting pipeline attempt $i..."
            set +e
            timeout 110m python -u pipeline_runner.py
            exit_code=$?
            set -e

            if [ "$exit_code" -eq 0 ]; then
              echo "Pipeline succeeded on attempt $i."
              break
            fi

            if [ "$exit_code" -eq 124 ]; then
              echo "pipeline failed (attempt $i): timed out after 110m (exit 124)."
            else
              echo "pipeline failed (attempt $i): process exited with code $exit_code."
            fi

            if [ "$i" -lt 2 ]; then
              echo "Retrying in 15s..."
              sleep 15
            else
              echo "All attempts failed."
              exit "$exit_code"
            fi
          done
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          TEST_MODE: ${{ github.event.inputs.test_mode }}
          KEYWORDS_OVERRIDE: ${{ github.event.inputs.keywords }}
          TOPIC: ${{ github.event.inputs.topic }}
          SOURCE_LIST_NAME: ${{ github.event.inputs.list_name }}
          SUMMARIZER_MODEL: google/flan-t5-base


      - name: Find PDF and Get Date
        id: find-pdf
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d "backend/output" ]; then
            echo "has_pdf=false" >> "$GITHUB_OUTPUT"
            echo "No backend/output directory; no PDF generated this run."
            exit 0
          fi

          PDF_FILE=$(find backend/output -name "*.pdf" -type f | head -n 1)
          if [ -z "${PDF_FILE:-}" ]; then
            echo "has_pdf=false" >> "$GITHUB_OUTPUT"
            echo "No PDF found this run."
            exit 0
          fi

          echo "has_pdf=true" >> "$GITHUB_OUTPUT"
          echo "pdf_path=$PDF_FILE" >> "$GITHUB_OUTPUT"
          CURRENT_DATE=$(date +%Y-%m-%d)
          echo "current_date=$CURRENT_DATE" >> "$GITHUB_OUTPUT"

      - name: Upload PDF as Direct Download
        if: success() && steps.find-pdf.outputs.has_pdf == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Reading-Roundup-${{ steps.find-pdf.outputs.current_date }}.pdf
          path: ${{ steps.find-pdf.outputs.pdf_path }}
          retention-days: 90

      - name: Cleanup credentials
        if: always()
        shell: bash
        run: |
          cd backend
          rm -f credentials.json
